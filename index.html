<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShaktiPath | From Potential to Power</title>
    <meta name="description" content="ShaktiPath empowers underserved girls in India through practical digital skills, AI literacy, and mentorship." />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Poppins (body) + Playfair Display (editorial display headings) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
            },
            colors: {
              brand: {
                // ── Page Backgrounds ─────────────────────────────────────
                surface: '#fdf4f7',       // Very pale warm pink — no more blue/green tint
                surfaceAlt: '#faf5ff',    // Violet-50: AI / tech sections

                // ── Primary Brand: Magenta (true pink) ────────────────────
                magenta: '#d4185c',       // Deep hot pink-magenta — real brand colour
                magentaDark: '#9d1258',   // Dark magenta — hover states, dark text
                magentaLight: '#f472b6',  // Light pink — highlights, glows

                // ── Accent: Teal (cool secondary accent) ──────────────────
                teal: '#0891b2',          // Cyan-600 — secondary accent only

                // ── Accent: Rose / Coral (warmth, stories, impact) ────────
                rose: '#f43f5e',          // Rose-500

                // ── Accent: Amber (energy, optimism, CTAs) ────────────────
                yellow: '#f59e0b',        // Amber-500

                // ── Dark sections ──────────────────────────────────────────
                navy: '#1a1a2e',          // Deep navy — dark hero overlays, footer
                ink:  '#1a1a2e',          // Near-black — display headings

                // ── Accent: Violet (AI / tech) ────────────────────────────
                violet: '#7c3aed',        // Violet-600
                violetLight: '#a78bfa',   // Violet-400
              }
            },
            letterSpacing: {
              tightest: '-0.04em',
            },
          }
        }
      }
    </script>
    <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-white text-gray-700 antialiased selection:bg-brand-magenta selection:text-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
