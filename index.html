<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShaktiPath | From Potential to Power</title>
    <meta name="description" content="ShaktiPath empowers underserved girls in India through practical digital skills, AI literacy, and mentorship." />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Poppins: added weight 800 for display headings + italic -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
            },
            colors: {
              brand: {
                // ── Page Backgrounds ─────────────────────────────────────
                surface: '#f0f9ff',       // Sky-50: subtle warm tint (was cyan-50)
                surfaceAlt: '#faf5ff',    // Violet-50: AI / tech sections

                // ── Primary Brand: Cyan ───────────────────────────────────
                magenta: '#06b6d4',       // Cyan-500: primary brand / interactive
                magentaDark: '#0e7490',   // Cyan-700: dark variant (4.9:1 contrast ✓)
                magentaLight: '#22d3ee',  // Cyan-400: bright highlights / glows

                // ── Accent: Teal (proper contrast) ────────────────────────
                teal: '#0891b2',          // Cyan-600 (was neon #00e5ff — unusable for text)

                // ── Accent: Rose / Coral (warmth, stories, impact) ────────
                rose: '#f43f5e',          // Rose-500 (was rose-400 — bolder, more vibrant)

                // ── Accent: Amber (energy, optimism, CTAs) ────────────────
                yellow: '#f59e0b',        // Amber-500 (richer than amber-400)

                // ── NEW: Navy (dark sections, premium depth) ──────────────
                navy: '#0c1a2e',          // Deep navy — dark hero overlays, footer

                // ── NEW: Violet (AI, innovation, tech layer) ──────────────
                violet: '#7c3aed',        // Violet-600 — AI section start
                violetLight: '#a78bfa',   // Violet-400 — soft highlights

                // ── NEW: Ink (headings, maximum contrast) ─────────────────
                ink: '#0f172a',           // Slate-900 — display headings
              }
            },
            letterSpacing: {
              tightest: '-0.04em',
            },
          }
        }
      }
    </script>
    <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-white text-slate-700 antialiased selection:bg-brand-violet selection:text-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
